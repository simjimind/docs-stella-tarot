<style>
*{box-sizing:border-box;margin:0;padding:0;}
.scene{
  min-height:540px;
  background:linear-gradient(145deg,#fde8f0 0%,#ede8fd 45%,#e8f0fd 100%);
  border-radius:20px;
  font-family:sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:2rem 1rem 2.5rem;
  position:relative;overflow:hidden;
}
.scene::before{content:'';position:absolute;top:-80px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(200,180,255,0.2);}
.scene::after{content:'';position:absolute;bottom:-50px;left:-50px;width:180px;height:180px;border-radius:50%;background:rgba(180,210,255,0.2);}

.top-badge{
  font-size:11px;letter-spacing:0.12em;color:#9a80c0;font-weight:600;
  background:rgba(255,255,255,0.6);border-radius:20px;padding:5px 14px;
  margin-bottom:1rem;z-index:2;
}
.title{font-size:17px;font-weight:500;color:#4a3d60;text-align:center;line-height:1.6;margin-bottom:0.4rem;z-index:2;}
.sub{font-size:13px;color:#a090c0;text-align:center;margin-bottom:1.8rem;z-index:2;}

/* 카드 덱 */
.deck-area{
  width:100%;max-width:520px;
  position:relative;
  height:200px;
  z-index:2;
  margin-bottom:1.2rem;
}
.deck-hint{text-align:center;font-size:13px;color:#b0a0c8;z-index:2;position:relative;transition:opacity 0.3s;}

.card-slot{
  position:absolute;
  width:72px;height:110px;
  cursor:pointer;
  transition:transform 0.3s ease;
  transform-style:preserve-3d;
  perspective:800px;
}
.card-slot:hover .card-inner{transform:rotateY(15deg) translateY(-14px);}
.card-slot.selected .card-inner{transform:rotateY(0deg) translateY(-18px);}
.card-slot.fade-out{opacity:0;transform:scale(0.85) translateY(20px);transition:all 0.4s ease;pointer-events:none;}

.card-inner{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.7s cubic-bezier(.4,0,.2,1);
}
.card-front,.card-back{
  position:absolute;inset:0;
  border-radius:12px;
  backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.card-back{
  background:linear-gradient(160deg,#c8b0f0,#a0b0f8,#b0d0f0);
  border:1.5px solid rgba(255,255,255,0.7);
  box-shadow:0 4px 16px rgba(160,140,220,0.25);
}
.card-back-pattern{
  width:52px;height:80px;
  border:1.5px solid rgba(255,255,255,0.5);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  background:rgba(255,255,255,0.12);
}
.card-back-pattern span{font-size:22px;opacity:0.85;}

.card-front{
  background:white;
  border:1.5px solid rgba(255,255,255,0.9);
  box-shadow:0 8px 30px rgba(160,140,220,0.3);
  transform:rotateY(180deg);
  padding:4px;
}
.cf-img-preview{width:100%;height:100%;object-fit:cover;border-radius:8px;}

/* 선택 후 큰 카드 뒤집기 */
.flip-stage{
  display:none;
  flex-direction:column;align-items:center;
  z-index:2;width:100%;
}
.big-card-wrap{
  width:180px;height:280px;
  perspective:1000px;
  margin-bottom:1.5rem;
}
.big-inner{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.9s cubic-bezier(.4,0,.2,1);
}
.big-inner.flipped{transform:rotateY(180deg);}
.big-front,.big-back{
  position:absolute;inset:0;
  border-radius:16px;
  backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 12px 40px rgba(160,140,220,0.3);
}
.big-back{
  background:linear-gradient(160deg,#c8b0f0,#a0b0f8,#b0d0f0);
  border:2px solid rgba(255,255,255,0.7);
}
.big-back-inner{
  width:140px;height:220px;
  border:2px solid rgba(255,255,255,0.5);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.1);
  font-size:46px;
}
.big-front{
  background:white;
  border:2px solid rgba(255,255,255,0.9);
  transform:rotateY(180deg);
  padding:8px;
}
.bf-image{width:100%;height:100%;object-fit:cover;border-radius:10px;background:#f5f5f5;}

/* 결과 카드 */
.result-card{
  width:100%;max-width:480px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(10px);
  border:1.5px solid rgba(220,210,250,0.7);
  border-radius:20px;
  padding:1.5rem;
  display:none;
  animation:fadeUp 0.6s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.rc-title{font-size:16px;color:#5040a0;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.rc-keywords{
  font-size:12px;color:#9070b0;font-weight:600;
  background:rgba(180,160,230,0.12);
  display:inline-block;padding:4px 12px;border-radius:10px;
  margin-bottom:12px;
}

/* Today's message 박스 */
.rc-quote-wrap{
  background:linear-gradient(135deg,rgba(200,180,255,0.18),rgba(180,160,240,0.08));
  border:1.5px solid rgba(180,160,240,0.3);
  border-radius:14px;
  padding:1rem 1.1rem;
  margin-bottom:10px;
}
.rc-section-label{
  font-size:10px;font-weight:700;letter-spacing:0.12em;
  margin-bottom:6px;display:block;
}
.rc-quote-label{color:#9070c0;}
.rc-quote-text{
  font-size:15px;color:#4a3d60;line-height:1.85;
  font-style:italic;word-break:keep-all;
}

/* 한걸음 나아가기 박스 */
.rc-action-wrap{
  background:linear-gradient(135deg,rgba(150,220,190,0.18),rgba(130,200,170,0.08));
  border:1.5px solid rgba(130,200,170,0.35);
  border-radius:14px;
  padding:1rem 1.1rem;
  margin-bottom:12px;
  display:none;
  animation:fadeUp 0.5s ease forwards;
}
.rc-action-label{color:#4a9a80;}
.rc-action-text{
  font-size:14px;color:#2e5c4a;line-height:1.85;word-break:keep-all;
}

.again-btn{
  width:100%;padding:12px;
  border:1.5px solid rgba(180,160,230,0.5);
  border-radius:14px;background:white;
  color:#8070b0;font-size:14px;cursor:pointer;
  transition:all 0.2s;
}
.again-btn:hover{background:rgba(180,160,230,0.1);transform:translateY(-2px);}
</style>

</div>

const SUITS = [
  {k:'Wands', ko:'지팡이', kw:'열정, 행동, 에너지'},
  {k:'Cups',  ko:'컵',    kw:'감정, 사랑, 관계'},
  {k:'Swords',ko:'검',    kw:'생각, 결단, 지성'},
  {k:'Disks', ko:'디스크',kw:'물질, 현실, 안정'}
];
const FACES = ['Ace','2','3','4','5','6','7','8','9','10','Princess','Prince','Queen','Knight'];

const MINOR_CARDS = [];
SUITS.forEach(suit => {
  FACES.forEach(face => {
    const d = MINOR_DATA[suit.k][face];
    MINOR_CARDS.push({
      n: face,
      name: `${suit.ko} ${face}`,
      keywords: suit.kw,
      quote: d.quote,
      action: d.action,
      img: `image/${suit.k.toLowerCase()}_${face.toLowerCase()}.jpg`
    });
  });
});

const FULL_DECK = [...MAJOR_CARDS, ...MINOR_CARDS];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

let busy = false;

function buildDeck(){
  const area = document.getElementById('deckArea');
  area.innerHTML = '';
  const pool = shuffle(FULL_DECK).slice(0, 10);
  const W = area.offsetWidth || 480;
  const total = pool.length;
  const cardW = 72;
  const spread = Math.min(W - cardW, total * 48);
  const step = spread / (total - 1);

  pool.forEach((c, i) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    const left = (W/2 - spread/2) + i*step - cardW/2;
    const baseAngle = (i - (total-1)/2) * 3.5;
    const baseY = Math.abs(i - (total-1)/2) * 1.5;
    slot.style.cssText = `left:${left}px;top:${baseY+30}px;transform:rotate(${baseAngle}deg);`;
    slot.innerHTML = `
      <div class="card-inner">
        <div class="card-back"><div class="card-back-pattern"><span>✦</span></div></div>
        <div class="card-front"><img src="${c.img}" class="cf-img-preview" onerror="this.src='https://via.placeholder.com/72x110?text=Card'"></div>
      </div>`;
    slot.onclick = () => selectCard(c, slot, pool, i);
    area.appendChild(slot);
  });
}

function selectCard(card, slot, pool, idx){
  if(busy) return;
  busy = true;

  document.querySelectorAll('.card-slot').forEach((s, i) => {
    if(i !== idx) setTimeout(() => s.classList.add('fade-out'), i < idx ? 0 : 50);
  });

  document.getElementById('deckHint').style.opacity = '0';
  document.getElementById('mainTitle').textContent = '카드를 뽑았습니다';
  document.getElementById('mainSub').textContent = '오늘의 메시지를 확인하세요';

  setTimeout(() => {
    document.getElementById('deckView').style.display = 'none';
    document.getElementById('flipStage').style.display = 'flex';
    document.getElementById('bfImage').src = card.img;

    setTimeout(() => {
      document.getElementById('bigInner').classList.add('flipped');
      setTimeout(() => { showReading(card); }, 800);
    }, 600);
  }, 500);
}

function showReading(card){
  const rc = document.getElementById('resultCard');
  rc.style.display = 'block';

  document.getElementById('rcTitle').textContent = `✦ ${card.name}`;
  document.getElementById('rcKeywords').textContent = `키워드  ${card.keywords}`;

  // Today's message 타이핑
  const quoteEl = document.getElementById('rcQuote');
  quoteEl.textContent = '';
  let i = 0;
  function typeQuote(){
    if(i < card.quote.length){
      quoteEl.textContent += card.quote[i++];
      setTimeout(typeQuote, 28);
    } else {
      // 타이핑 완료 후 한걸음 나아가기 등장
      setTimeout(() => {
        const actionWrap = document.getElementById('rcActionWrap');
        actionWrap.style.display = 'block';
        const actionEl = document.getElementById('rcAction');
        actionEl.textContent = '';
        let j = 0;
        function typeAction(){
          if(j < card.action.length){
            actionEl.textContent += card.action[j++];
            setTimeout(typeAction, 22);
          }
        }
        typeAction();
      }, 300);
    }
  }
  typeQuote();
}

function restart(){
  busy = false;
  location.reload();
}

window.addEventListener('load', () => { setTimeout(buildDeck, 100); });
</script>
